name: Build macOS dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build pyutil.dylib
        run: |
          gcc -dynamiclib -fPIC \
            -install_name @rpath/pyutil.dylib \
            -O2 -Wall \
            -o pyutil.dylib \
            Src/Utils/PyUtils/PyUtil.c \
            -I Src/Utils/Ver2

      - name: Upload dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyutil-dylib
          path: pyutil.dylib
